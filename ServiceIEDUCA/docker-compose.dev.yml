services:
  postgres:
    image: postgres:16-alpine
    container_name: serviceieduca-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: serviceieduca
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d serviceieduca"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  postgres_dev_data:

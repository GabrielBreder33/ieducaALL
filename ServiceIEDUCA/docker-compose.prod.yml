services:
  api-ieduca:
    image: ${APP_IMAGE}
    container_name: serviceieduca-api
    restart: unless-stopped
    pull_policy: always
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_STRING}
      DeepSeek__ApiKey: ${DEEPSEEK_API_KEY}
      DeepSeek__BaseUrl: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DeepSeek__ApiUrl: ${DEEPSEEK_API_URL:-https://api.deepseek.com/v1/chat/completions}
      DeepSeek__Model: ${DEEPSEEK_MODEL:-deepseek-chat}

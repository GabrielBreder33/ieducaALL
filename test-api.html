<!DOCTYPE html>
<html>
<head>
    <title>Teste API - IEduca</title>
    <style>
        body { 
            font-family: Arial; 
            padding: 20px; 
            background: #1e293b;
            color: white;
        }
        button { 
            padding: 10px 20px; 
            margin: 5px; 
            cursor: pointer;
            background: #3b82f6;
            border: none;
            color: white;
            border-radius: 5px;
            font-size: 16px;
        }
        button:hover {
            background: #2563eb;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #334155;
            border-radius: 5px;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }
        .success { color: #10b981; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <h1>🧪 Teste API - IEduca</h1>
    
    <h2>Teste de Atividades</h2>
    <button onclick="testarIniciarAtividade()">1️⃣ Iniciar Atividade</button>
    <button onclick="testarEstatisticas()">📊 Ver Estatísticas</button>
    <button onclick="testarHistorico()">📜 Ver Histórico</button>
    
    <div id="result" class="result"></div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        const resultDiv = document.getElementById('result');

        function log(message, isError = false) {
            const timestamp = new Date().toLocaleTimeString();
            const className = isError ? 'error' : 'success';
            resultDiv.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
        }

        async function testarIniciarAtividade() {
            resultDiv.innerHTML = '';
            log('🚀 Iniciando teste de atividade...');
            
            try {
                const body = {
                    userId: 1,
                    atividadeId: 1,
                    totalQuestoes: 10
                };
                
                log('📤 Enviando: ' + JSON.stringify(body, null, 2));
                
                const response = await fetch(`${API_URL}/AtividadeExecucoes/iniciar`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(body)
                });

                log(`📥 Status: ${response.status} ${response.statusText}`);

                if (!response.ok) {
                    const error = await response.text();
                    log('❌ Erro: ' + error, true);
                    return;
                }

                const data = await response.json();
                log('✅ Sucesso! Resposta:');
                log(JSON.stringify(data, null, 2));
                
                // Salvar ID para testes futuros
                window.lastExecucaoId = data.id;
                log(`\n💾 ID da execução salvo: ${data.id}`);
                
            } catch (error) {
                log('❌ Erro de conexão: ' + error.message, true);
                log('⚠️ Verifique se o backend está rodando em ' + API_URL, true);
            }
        }

        async function testarEstatisticas() {
            resultDiv.innerHTML = '';
            log('📊 Buscando estatísticas do usuário 1...');
            
            try {
                const response = await fetch(`${API_URL}/AtividadeExecucoes/usuario/1/estatisticas`);
                
                log(`📥 Status: ${response.status} ${response.statusText}`);

                if (!response.ok) {
                    const error = await response.text();
                    log('❌ Erro: ' + error, true);
                    return;
                }

                const data = await response.json();
                log('✅ Estatísticas:');
                log(JSON.stringify(data, null, 2));
                
            } catch (error) {
                log('❌ Erro: ' + error.message, true);
            }
        }

        async function testarHistorico() {
            resultDiv.innerHTML = '';
            log('📜 Buscando histórico do usuário 1...');
            
            try {
                const response = await fetch(`${API_URL}/AtividadeExecucoes/usuario/1`);
                
                log(`📥 Status: ${response.status} ${response.statusText}`);

                if (!response.ok) {
                    const error = await response.text();
                    log('❌ Erro: ' + error, true);
                    return;
                }

                const data = await response.json();
                log(`✅ Encontradas ${data.length} atividades:`);
                log(JSON.stringify(data, null, 2));
                
            } catch (error) {
                log('❌ Erro: ' + error.message, true);
            }
        }
    </script>
</body>
</html>
